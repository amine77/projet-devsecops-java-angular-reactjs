# ══════════════════════════════════════════════════════════════
#  CONFIGURATION NGINX — frontend-react/nginx.conf
# ══════════════════════════════════════════════════════════════
#
#  Identique à la config Angular — même problème SPA :
#  → React Router gère les URLs côté client
#  → Nginx doit toujours retourner index.html pour les routes inconnues
#
#  VITE vs Angular CLI pour le build :
#  → Angular CLI : dist/angular/<app-name>/browser/*.js (avec hashes)
#  → Vite : dist/*.js (avec hashes dans le nom)
#  → Dans les deux cas : assets hashés → cache 1 an

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Routing SPA — crucial pour React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long terme pour les assets Vite (hashés)
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
        access_log off;
    }

    server_tokens off;
}
