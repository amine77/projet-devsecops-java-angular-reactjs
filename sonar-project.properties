# ══════════════════════════════════════════════════════════════
#  SONARCLOUD — Configuration du projet
#  Fichier : sonar-project.properties
# ══════════════════════════════════════════════════════════════
#
#  SonarCloud analyse :
#  → La qualité du code (code smells, duplications)
#  → La couverture de tests (jacoco.xml)
#  → Les bugs potentiels (analyse statique)
#  → Les vulnérabilités de sécurité (OWASP Top 10)
#
#  CONFIGURATION :
#  → projectKey : identifiant unique sur SonarCloud (org_repo)
#  → organization : nom de l'organisation SonarCloud
#  → sources : dossiers sources à analyser
#  → exclusions : dossiers à exclure (generated, test, node_modules)
#
#  QUALITY GATE :
#  → SonarCloud applique un "Quality Gate" : seuils de qualité
#  → Si le gate échoue, le CI échoue aussi (bloque le merge de la PR)
#  → Seuils par défaut : couverture > 80%, 0 bug critique, 0 vuln haute

# Identifiants SonarCloud
sonar.projectKey=amine77_projet-devsecops-java-angular-reactjs
sonar.organization=amine77
sonar.projectName=Todo Enterprise

# Sources Java (backend multi-module)
sonar.sources=\
  backend/domain/src/main/java,\
  backend/application/src/main/java,\
  backend/infrastructure/src/main/java

sonar.tests=\
  backend/domain/src/test/java,\
  backend/application/src/test/java,\
  backend/infrastructure/src/test/java

# Rapports Jacoco (couverture de tests)
sonar.coverage.jacoco.xmlReportPaths=\
  backend/domain/target/site/jacoco/jacoco.xml,\
  backend/application/target/site/jacoco/jacoco.xml,\
  backend/infrastructure/target/site/jacoco/jacoco.xml

# Sources TypeScript (frontends)
sonar.javascript.lcov.reportPaths=\
  frontend-react/coverage/lcov.info

# Exclusions : fichiers générés, configurations, tests
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/target/**,\
  **/*.min.js,\
  **/migrations/**,\
  **/*Test.java,\
  **/*Spec.ts,\
  **/__tests__/**

# Encodage des sources
sonar.sourceEncoding=UTF-8
