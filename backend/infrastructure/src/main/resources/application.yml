# ============================================================
#  application.yml — Configuration commune (tous profils)
#  Les profils surchargent ces valeurs :
#    application-local.yml → Minikube / Docker Compose
#    application-aws.yml   → App Runner + RDS + Cognito
# ============================================================

spring:
  application:
    name: todo-api

  # ── JPA / Hibernate ────────────────────────────────────────
  jpa:
    open-in-view: false          # Évite le OSIV anti-pattern
    hibernate:
      ddl-auto: validate         # Flyway gère le schéma — Hibernate valide seulement
    properties:
      hibernate:
        default_schema: public
        format_sql: true
        jdbc:
          batch_size: 50         # Batch inserts/updates pour la performance

  # ── Flyway — migrations SQL ─────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Cache Redis ─────────────────────────────────────────────
  cache:
    type: redis
    redis:
      time-to-live: 300000       # 5 minutes par défaut

  # ── Kafka ──────────────────────────────────────────────────
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: todo-api
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.todo.*"

  # ── Virtual Threads (Java 21 / Spring Boot 3.2+) ─────────────
  threads:
    virtual:
      enabled: true              # Active les Virtual Threads pour tous les servlets

# ── Actuator / Health ──────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true            # /actuator/health/liveness et /readiness pour K8s
  metrics:
    tags:
      application: ${spring.application.name}

# ── Logging ───────────────────────────────────────────────────
logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.todo: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

# ── Application custom ────────────────────────────────────────
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}
  storage:
    max-file-size: 10MB
    allowed-types: image/jpeg,image/png,image/gif,application/pdf
