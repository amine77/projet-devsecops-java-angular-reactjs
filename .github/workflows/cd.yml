# ══════════════════════════════════════════════════════════════
#  WORKFLOW CD — Déploiement continu vers AWS (EC2 Minikube)
#  Fichier : .github/workflows/cd.yml
# ══════════════════════════════════════════════════════════════
#
#  Ce workflow déploie l'application sur un EC2 t2.micro (Free Tier)
#  faisant tourner Minikube, après chaque push sur master.
#
#  ARCHITECTURE DE DÉPLOIEMENT :
#
#  GitHub Actions
#    → Build Docker images (3 images : backend, angular, react)
#    → Push vers Amazon ECR (Elastic Container Registry)
#    → helm upgrade via kubeconfig → Minikube sur EC2
#
#  MINIKUBE SUR EC2 (remplace ECS Fargate) :
#  → EC2 t2.micro = Free Tier (750h/mois gratuit)
#  → Minikube = Kubernetes mono-nœud sur l'EC2
#  → helm upgrade --install → rolling update sans downtime
#  → PostgreSQL + Redis = pods Kubernetes (charts Bitnami)
#
#  AVANTAGES vs ECS Fargate :
#  → Coût : $0/mois (Free Tier) vs ~$66/mois (ECS+RDS+Redis+ALB)
#  → Apprentissage : kubectl/helm = mêmes commandes que EKS en prod
#  → Simplicité : un seul job deploy (helm) vs 2 jobs ECS séparés
#
#  ECR :
#  → Registry Docker privé géré par AWS
#  → Images immutables : le tag = SHA du commit Git
#  → Lifecycle policy : supprime les images de plus de 30 jours
#
#  AUTHENTIFICATION AWS :
#  → OIDC (OpenID Connect) : GitHub Actions s'authentifie auprès d'AWS
#    sans stocker de clés AWS dans les secrets GitHub !
#  → aws-actions/configure-aws-credentials gère l'échange de tokens
#  → Rôle IAM avec permissions minimales (principe du moindre privilège)
#
#  SECRETS GITHUB REQUIS :
#  → AWS_ACCOUNT_ID    : ID du compte AWS (12 chiffres)
#  → AWS_REGION        : ex. eu-west-3
#  → AWS_ROLE_TO_ASSUME: ARN du rôle IAM GitHub Actions (OIDC)
#  → KUBECONFIG_B64    : kubeconfig Minikube encodé en base64
#  → VITE_API_URL      : URL de l'API backend (pour le build React)
#  → VITE_OIDC_AUTHORITY : URL Keycloak/Cognito (pour le build React)

name: CD — Deploy to AWS (Minikube)

on:
  push:
    branches: [ master, main ]
  # Déclenchement manuel avec choix de l'environnement
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement de deploiement'
        required: true
        default: 'staging'
        type: choice
        options: [ staging, production ]

# Empêche deux déploiements simultanés
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false    # Ne pas annuler un déploiement en cours !

# PERMISSIONS OIDC — obligatoires pour s'authentifier à AWS sans clé statique
# id-token: write  → GitHub génère un JWT signé que AWS STS peut valider
# Sans cette ligne : "Unable to get OIDC token" → échec immédiat en 8s
permissions:
  id-token: write   # Requis pour aws-actions/configure-aws-credentials avec OIDC
  contents: read    # Lecture du code source

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'eu-west-3' }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION || 'eu-west-3' }}.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ── Job 1 : Build + Push des images Docker vers ECR ──────────
  build-and-push:
    name: Build et Push vers ECR
    runs-on: ubuntu-latest
    # Ne déploie que si on est sur master (pas en PR)
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    # Outputs : les digests des images pour le déploiement
    outputs:
      backend-image: ${{ steps.build-backend.outputs.image }}
      angular-image: ${{ steps.build-angular.outputs.image }}
      react-image: ${{ steps.build-react.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authentification AWS via OIDC (sans clés statiques) ──
      - name: Configurer les credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          # OIDC : GitHub génère un token JWT signé par son OIDC provider
          # AWS IAM vérifie ce token et échange contre des credentials temporaires

      - name: Login vers Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build Backend ──────────────────────────────────────────
      - name: Build et push image backend
        id: build-backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/infrastructure/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/todo-backend:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/todo-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Labels OCI pour la traçabilité
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      # ── Build Angular ──────────────────────────────────────────
      - name: Build et push image Angular
        id: build-angular
        uses: docker/build-push-action@v6
        with:
          context: frontend-angular
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/todo-frontend-angular:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/todo-frontend-angular:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

      # ── Build React ────────────────────────────────────────────
      - name: Build et push image React
        id: build-react
        uses: docker/build-push-action@v6
        with:
          context: frontend-react
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_OIDC_AUTHORITY=${{ secrets.VITE_OIDC_AUTHORITY }}
            VITE_OIDC_CLIENT_ID=${{ secrets.VITE_OIDC_CLIENT_ID || 'todo-spa' }}
            VITE_OIDC_REDIRECT_URI=${{ secrets.VITE_OIDC_REDIRECT_URI }}
          tags: |
            ${{ env.ECR_REGISTRY }}/todo-frontend-react:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/todo-frontend-react:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2 : Déploiement Helm sur Minikube (EC2) ──────────────
  #
  #  Remplace les deux jobs ECS (deploy-backend + deploy-frontends)
  #  par un seul job helm upgrade idempotent.
  #
  #  IDEMPOTENT : on peut relancer ce job 10 fois, le résultat est
  #  toujours le même. Si le déploiement échoue, --atomic fait
  #  un rollback automatique vers la version précédente.
  deploy:
    name: Deployer sur Minikube (EC2)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authentification AWS (pour renouveler le token ECR) ───
      - name: Configurer les credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Installer kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: Installer Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.15.0'

      - name: Configurer kubeconfig
        run: |
          # Décoder le kubeconfig depuis le secret GitHub (base64)
          # Ce kubeconfig pointe vers l'API server Minikube sur l'EC2
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

          # Vérifier la connexion au cluster
          kubectl cluster-info
          kubectl get nodes

      - name: Renouveler le secret ECR (token expire apres 12h)
        run: |
          # Le token ECR expire toutes les 12h → le renouveler à chaque déploiement
          # L'instance profile IAM de l'EC2 ne peut pas le faire automatiquement
          # depuis GitHub Actions → on passe par le rôle OIDC

          # Récupérer un nouveau token ECR
          ECR_TOKEN=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})

          # Mettre à jour le secret Kubernetes pour que les pods puissent puller
          kubectl create secret docker-registry ecr-secret \
            --docker-server=${{ env.ECR_REGISTRY }} \
            --docker-username=AWS \
            --docker-password="${ECR_TOKEN}" \
            --namespace=todo-app \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Installer les dependances Helm (PostgreSQL + Redis) si absent
        run: |
          # Ajouter le repo Bitnami si absent
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

          # Installer PostgreSQL si pas déjà présent
          # --wait : attendre que PostgreSQL soit ready avant de continuer
          if ! helm status postgres -n data &>/dev/null; then
            echo "Installation PostgreSQL..."
            helm install postgres bitnami/postgresql \
              --namespace data \
              --create-namespace \
              -f helm/values/postgres-values.yaml \
              --wait --timeout=5m
          else
            echo "PostgreSQL deja installe."
          fi

          # Installer Redis si pas déjà présent
          if ! helm status redis -n data &>/dev/null; then
            echo "Installation Redis..."
            helm install redis bitnami/redis \
              --namespace data \
              --create-namespace \
              -f helm/values/redis-values.yaml \
              --wait --timeout=3m
          else
            echo "Redis deja installe."
          fi

      - name: Deployer l'application avec Helm
        run: |
          # helm upgrade --install :
          # → upgrade si le chart existe déjà (mise à jour)
          # → install si c'est le premier déploiement
          # C'est la commande idempotente standard pour le CD

          helm upgrade --install todo-enterprise ./helm/todo-enterprise \
            --namespace todo-app \
            --create-namespace \
            --set ecr.registry=${{ env.ECR_REGISTRY }} \
            --set backend.image.tag=${{ env.IMAGE_TAG }} \
            --set frontendAngular.image.tag=${{ env.IMAGE_TAG }} \
            --set frontendReact.image.tag=${{ env.IMAGE_TAG }} \
            --wait \
            --timeout=5m \
            --atomic

          # --atomic : si le déploiement échoue, rollback automatique
          # vers la version précédente (zéro downtime garanti)

      - name: Verifier le deploiement
        run: |
          kubectl get pods -n todo-app
          kubectl get services -n todo-app
          kubectl get ingress -n todo-app
          echo "=== Deploiement reussi — commit ${{ env.IMAGE_TAG }} ==="

  # ── Job 3 : Notification de fin de déploiement ───────────────
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [ deploy ]
    if: always()    # Toujours notifier, succès ou échec

    steps:
      - name: Resume du deploiement
        run: |
          echo "Deploiement termine"
          echo "Commit : ${{ github.sha }}"
          echo "Auteur : ${{ github.actor }}"
          echo "Deploiement Helm : ${{ needs.deploy.result }}"
          # En production : envoyer une notification Slack/Teams/PagerDuty
          # curl -X POST $SLACK_WEBHOOK -d '{"text":"Deploy OK"}'
