# ══════════════════════════════════════════════════════════════
#  CONFIGURATION NGINX — frontend-angular/nginx.conf
# ══════════════════════════════════════════════════════════════
#
#  Nginx sert les fichiers statiques du build Angular.
#
#  PROBLÈME DES SPAs :
#  → Une SPA (Single Page App) gère le routing côté client via JavaScript
#  → Si l'utilisateur accède directement à /tasks/123/edit, Nginx cherche
#    ce fichier sur le disque → 404 car le fichier n'existe pas
#  → Solution : try_files renvoie TOUJOURS index.html pour les routes inexistantes
#    Angular Router intercepte l'URL et affiche le bon composant
#
#  SÉCURITÉ :
#  → X-Frame-Options : empêche le clickjacking (embedding dans une iframe)
#  → X-Content-Type-Options : empêche le MIME sniffing (injection de scripts)
#  → X-XSS-Protection : protection XSS legacy (navigateurs anciens)
#  → Referrer-Policy : contrôle les infos envoyées dans le header Referer
#  → Content-Security-Policy : à configurer selon les domaines autorisés
#
#  CACHE :
#  → Les assets Angular ont des hashes dans leurs noms (main.abc123.js)
#    → Cache long terme (1 an) : safe car le hash change à chaque build
#  → index.html : PAS de cache (doit toujours être la version fraîche)

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Headers de sécurité ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Compression Gzip ─────────────────────────────────────
    # Réduit la taille des assets JS/CSS (~70%)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Routing SPA (point critique) ─────────────────────────
    location / {
        # Cherche le fichier exact → le dossier → index.html
        # L'= final est le fallback SPA : toujours servir index.html
        try_files $uri $uri/ /index.html;
    }

    # ── Cache long terme pour les assets hashés ──────────────
    # Angular CLI génère : main.abc123.js → hash change à chaque build
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Pas d'access log pour les assets statiques (réduire le bruit)
        access_log off;
    }

    # ── Pas de cache pour index.html ─────────────────────────
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── Health check endpoint ─────────────────────────────────
    # Utilisé par ECS/ALB pour vérifier que le container est healthy
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
        access_log off;
    }

    # ── Masquer la version Nginx (sécurité) ──────────────────
    server_tokens off;
}
