# ══════════════════════════════════════════════════════════════
#  SECRET — Credentials PostgreSQL
# ══════════════════════════════════════════════════════════════
#
#  PROBLÈME RÉSOLU :
#  → Le chart Bitnami crée le secret "postgres-postgresql" dans le
#    namespace "data" avec le mot de passe de todouser.
#  → Le backend tourne dans le namespace "todo-app".
#  → Les Secrets Kubernetes sont limités à un namespace.
#  → Solution : recréer le secret dans "todo-app" avec le même mot de passe.
#
#  PRODUCTION :
#  → Utiliser External Secrets Operator (ESO) pour synchroniser
#    le secret depuis AWS Secrets Manager ou HashiCorp Vault.
#  → Ne jamais stocker le mot de passe en clair dans values.yaml.
#
#  APPRENTISSAGE :
#  → Ici : mot de passe dans values.yaml (dev only — acceptable)
#  → --set postgres.password=$(kubectl get secret ... -o jsonpath='{.data.password}' | base64 -d)
#    peut être utilisé en pipeline pour éviter de hardcoder le mdp
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "todo-enterprise.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  annotations:
    helm.sh/resource-policy: keep
    # keep : Helm ne supprime pas ce secret lors d'un helm uninstall
    # → les données PostgreSQL restent accessibles après réinstallation
type: Opaque
stringData:
  # Mot de passe en clair → Kubernetes l'encode automatiquement en base64
  {{ .Values.postgres.secretKey }}: {{ .Values.postgres.password | quote }}
