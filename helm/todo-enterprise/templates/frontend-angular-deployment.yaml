# ══════════════════════════════════════════════════════════════
#  DEPLOYMENT — Frontend Angular (Nginx)
# ══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "todo-enterprise.fullname" . }}-angular
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "todo-enterprise.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend-angular
spec:
  replicas: {{ .Values.frontendAngular.replicaCount }}

  selector:
    matchLabels:
      {{- include "todo-enterprise.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend-angular

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        {{- include "todo-enterprise.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend-angular

    spec:
      imagePullSecrets:
        - name: {{ .Values.ecr.pullSecret }}

      containers:
        - name: todo-frontend-angular
          image: {{ include "todo-enterprise.angularImage" . }}
          imagePullPolicy: {{ .Values.frontendAngular.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          resources:
            {{- toYaml .Values.frontendAngular.resources | nindent 12 }}

          # Nginx démarre en ~1s → délai minimal
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
