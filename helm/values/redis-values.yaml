# ══════════════════════════════════════════════════════════════
#  VALUES BITNAMI REDIS
#  helm install redis bitnami/redis -n data -f helm/values/redis-values.yaml
# ══════════════════════════════════════════════════════════════
#
#  Chart Bitnami Redis — options minimales pour t2.micro
#  Doc : https://github.com/bitnami/charts/tree/main/bitnami/redis

auth:
  # Désactivé pour simplifier la config locale
  # En prod : enabled: true + password: "secret"
  enabled: false

# ── Architecture standalone (pas de Sentinel/Cluster) ────────
# Sentinel et Cluster nécessitent plusieurs nodes → pas possible sur t2.micro
architecture: standalone

master:
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
      cpu: "100m"

  persistence:
    enabled: true
    size: "1Gi"

# ── Désactiver les métriques (économiser du RAM) ─────────────
metrics:
  enabled: false
