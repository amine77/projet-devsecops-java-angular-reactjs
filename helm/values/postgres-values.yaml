# ══════════════════════════════════════════════════════════════
#  VALUES BITNAMI POSTGRESQL
#  helm install postgres bitnami/postgresql -n data -f helm/values/postgres-values.yaml
# ══════════════════════════════════════════════════════════════
#
#  Chart Bitnami PostgreSQL — options minimales pour t2.micro
#  Doc : https://github.com/bitnami/charts/tree/main/bitnami/postgresql

auth:
  # Nom de la base de données créée automatiquement
  database: tododb
  # Utilisateur applicatif (pas postgres superuser)
  username: todouser
  # Mot de passe (à changer en prod — utiliser un Secret externe)
  password: "todopassword"

# ── Ressources ────────────────────────────────────────────────
# Minimales pour un t2.micro (1GB RAM total)
primary:
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "300m"

  # Persistence : données stockées sur EBS (PersistentVolumeClaim)
  persistence:
    enabled: true
    size: "5Gi"      # 5 GB sur les 30 GB Free Tier
    storageClass: ""  # Utilise la StorageClass par défaut de Minikube

# ── Une seule instance (pas de HA sur t2.micro) ───────────────
architecture: standalone

# ── Désactiver les métriques (économiser du RAM) ─────────────
metrics:
  enabled: false
